/* Persistência: window.storage (artifact) com fallback p/ localStorage */
/* ------------------------------------------------------------------ */
const KEY = "rotina-app-state-v1";
const store = {
  async get() {
    if (typeof window !== "undefined" && window.storage) {
      try {
        const r = await window.storage.get(KEY);
        return r ? JSON.parse(r.value) : null;
      } catch {
        return null;
      }
    }
    try {
      const v = localStorage.getItem(KEY);
      return v ? JSON.parse(v) : null;
    } catch {
      return null;
    }
  },
  async set(val) {
    const s = JSON.stringify(val);
    if (typeof window !== "undefined" && window.storage) {
      try { await window.storage.set(KEY, s); return; } catch {}
    }
    try { localStorage.setItem(KEY, s); } catch {}
  },
};

function parseChatMsg(text) {
  const t = text.toLowerCase();
  const m = t.match(/(\d{1,3}(?:\.\d{3})+,\d{1,2}|\d+,\d{1,2}|\d+(?:\.\d{1,2})?)/);
  if (!m) return null;
  const value = parseMoney(m[1]);
  if (!value || value <= 0) return null;
  const isIn = /(recebi|ganhei|entrou|caiu|sal[aá]rio|pagamento|lucro|faturei)/.test(t);
  let category = "Outros";
  if (isIn) category = "Entrada";
  else for (const [c, ws] of Object.entries(KEYWORDS)) {
    if (ws.some((w) => t.includes(w))) { category = c; break; }
  }
  return { type: isIn ? "in" : "out", value, category, desc: text.trim() };
}

/* ------------------------------ ring comp -------------------------------- */
function Ring({ value, color, size = 78, stroke = 8 }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.min(1, value));
  return (
    <svg width={size} height={size}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#242C38" strokeWidth={stroke} />
      <circle
        cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`}
        style={{ transition: "stroke-dashoffset .5s ease" }}
      />
      <text x="50%" y="50%" textAnchor="middle" dy="0.35em"
        className="rt-ring-ctr" fill="#E7EBF2" fontSize={size * 0.28}>
        {Math.round(value * 100)}
      </text>
    </svg>
  );
}

/* ------------------------------- modal ----------------------------------- */
function Modal({ title, onClose, children }) {
  return (
    <div className="rt-modal-bg" onClick={onClose}>
      <div className="rt-modal" onClick={(e) => e.stopPropagation()}>
        <div className="rt-modal-ttl">
          {title}
          <button className="rt-iconbtn" onClick={onClose}><X size={20} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ================================ APP ==================================== */
function App() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState("today");
  const [sel, setSel] = useState(new Date());
  const saveT = useRef(null);

  // load once
  useEffect(() => {
    (async () => {
      const s = await store.get();
      const base = s || { days: {}, generalTasks: [], goals: [] };
      if (!base.finance) base.finance = defaultFinance();
      if (!base.finance.planned) base.finance.planned = [];
      if (!base.editorial) base.editorial = defaultEditorial();
      setState(base);
    })();
  }, []);

  // debounced save
  useEffect(() => {
    if (!state) return;
    clearTimeout(saveT.current);
    saveT.current = setTimeout(() => store.set(state), 400);
  }, [state]);

  if (!state) {
    return (
      <div className="rt-root" style={{ display: "grid", placeItems: "center", height: "100vh" }}>
        <style>{CSS}</style>
        <div className="rt-eyebrow">carregando…</div>
      </div>
    );
  }

  const dk = keyOf(sel);
  const day = state.days[dk] || emptyDay();

  const setDay = (patch) =>
    setState((s) => ({
      ...s,
      days: { ...s.days, [dk]: { ...emptyDay(), ...s.days[dk], ...patch } },
    }));

  const shiftDay = (n) => {
    const d = new Date(sel);
    d.setDate(d.getDate() + n);
    setSel(d);
  };

  /* --- progress for rings --- */
  const tasksProg = day.tasks.length ? day.tasks.filter((t) => t.done).length / day.tasks.length : 0;
  const workoutProg = day.workout.done ? 1 : (day.workout.exercises.length ? 0.4 : 0);
  const goalsProg = (() => {
    if (!state.goals.length) return 0;
    const vals = state.goals.map((g) => {
      const v = day.goalLog[g.id] || 0;
      return g.target ? Math.min(1, v / g.target) : 0;
    });
    return vals.reduce((a, b) => a + b, 0) / vals.length;
  })();

  return (
    <div className="rt-root">
      <style>{CSS}</style>

      {/* header */}
      <div className="rt-head">
        <div className="rt-datebar">
          <button className="rt-nav" onClick={() => shiftDay(-1)} aria-label="Dia anterior"><ChevronLeft size={22} /></button>
          <div className="rt-datemid">
            <div className="rt-dow">{WD[sel.getDay()]}</div>
            <div className="rt-date">{sel.getDate()} {MO[sel.getMonth()]}</div>
            {!sameDay(sel, new Date()) && (
              <span className="rt-today-pill" onClick={() => setSel(new Date())}>voltar pra hoje</span>
            )}
          </div>
          <button className="rt-nav" onClick={() => shiftDay(1)} aria-label="Próximo dia"><ChevronRight size={22} /></button>
        </div>
      </div>

      <div className="rt-main">
        {tab === "today" && (
          <TodayView state={state} setState={setState} day={day} setDay={setDay}
            rings={{ tasksProg, workoutProg, goalsProg }} dk={dk} setTab={setTab} sel={sel} />
        )}
        {tab === "editorial" && (
          <EditorialView state={state} setState={setState} sel={sel} />
        )}
        {tab === "agenda" && (
          <AgendaView state={state} setState={setState} sel={sel} setSel={setSel} day={day} setDay={setDay} />
        )}
        {tab === "workout" && (
          <WorkoutView day={day} setDay={setDay} sel={sel} />
        )}
        {tab === "money" && (
          <FinanceView state={state} setState={setState} dk={dk} />
        )}
        {tab === "progress" && (
          <ProgressView state={state} setState={setState} day={day} setDay={setDay} dk={dk} />
        )}
      </div>

      {/* tabs */}
      <div className="rt-tabs">
        {[
          ["today", "Hoje", ListChecks],
          ["agenda", "Agenda", Calendar],
          ["workout", "Treino", Dumbbell],
          ["editorial", "Conteúdo", Newspaper],
          ["money", "Finanças", Wallet],
          ["progress", "Metas", Target],
        ].map(([id, lbl, Ico]) => (
          <button key={id} className={`rt-tab ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
            <Ico size={20} />
            {lbl}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ------------------------------- TODAY ----------------------------------- */
function TodayView({ state, setState, day, setDay, rings, dk, setTab, sel }) {
  const [mode, setMode] = useState("day"); // day | general
  const [txt, setTxt] = useState("");

  const wk = weekKeyOf(sel);
  const edDone = state.editorial?.weeks?.[wk]?.done || {};
  const todayStops = EDITORIAL[sel.getDay()];
  const toggleStop = (id) => setState((s) => {
    const ed = s.editorial || defaultEditorial();
    const week = ed.weeks[wk] || { done: {} };
    return { ...s, editorial: { ...ed, weeks: { ...ed.weeks, [wk]: { done: { ...week.done, [id]: !week.done[id] } } } } };
  });

  const addDayTask = () => {
    if (!txt.trim()) return;
    setDay({ tasks: [...day.tasks, { id: uid(), text: txt.trim(), done: false }] });
    setTxt("");
  };
  const toggleDayTask = (id) =>
    setDay({ tasks: day.tasks.map((t) => (t.id === id ? { ...t, done: !t.done } : t)) });
  const delDayTask = (id) => setDay({ tasks: day.tasks.filter((t) => t.id !== id) });

  const addGen = () => {
    if (!txt.trim()) return;
    setState((s) => ({ ...s, generalTasks: [...s.generalTasks, { id: uid(), text: txt.trim(), done: false }] }));
    setTxt("");
  };
  const toggleGen = (id) =>
    setState((s) => ({ ...s, generalTasks: s.generalTasks.map((t) => (t.id === id ? { ...t, done: !t.done } : t)) }));
  const delGen = (id) =>
    setState((s) => ({ ...s, generalTasks: s.generalTasks.filter((t) => t.id !== id) }));
  const pushToDay = (t) => {
    setDay({ tasks: [...day.tasks, { id: uid(), text: t.text, done: false }] });
    setState((s) => ({ ...s, generalTasks: s.generalTasks.filter((x) => x.id !== t.id) }));
  };

  return (
    <>
      {/* rings */}
      <div className="rt-card">
        <div className="rt-rings">
          <div className="rt-ring">
            <Ring value={rings.workoutProg} color={RING.workout} />
            <div className="rt-ring-lbl">Treino</div>
          </div>
          <div className="rt-ring">
            <Ring value={rings.tasksProg} color={RING.tasks} />
            <div className="rt-ring-lbl">Tarefas</div>
          </div>
          <div className="rt-ring">
            <Ring value={rings.goalsProg} color={RING.goals} />
            <div className="rt-ring-lbl">Metas</div>
          </div>
        </div>
      </div>

      {/* tasks */}
      <div className="rt-card">
        <div className="rt-secttl">
          <ListChecks size={18} color={RING.tasks} />
          <h2>Tarefas</h2>
        </div>
        <div className="rt-seg">
          <button className={mode === "day" ? "on" : ""} onClick={() => setMode("day")}>Do dia</button>
          <button className={mode === "general" ? "on" : ""} onClick={() => setMode("general")}>Gerais</button>
        </div>

        {mode === "day" ? (
          <>
            {day.tasks.length === 0 && <div className="rt-empty">Nada pra hoje ainda. Adiciona abaixo.</div>}
            {day.tasks.map((t) => (
              <div className="rt-row" key={t.id}>
                <button className={`rt-check ${t.done ? "on" : ""}`} onClick={() => toggleDayTask(t.id)}>
                  {t.done && <Check size={15} color="#111" strokeWidth={3} />}
                </button>
                <span className={`rt-row-tx ${t.done ? "done" : ""}`}>{t.text}</span>
                <button className="rt-iconbtn" onClick={() => delDayTask(t.id)}><Trash2 size={17} /></button>
              </div>
            ))}
            <div className="rt-add">
              <input className="rt-input" placeholder="Nova tarefa do dia" value={txt}
                onChange={(e) => setTxt(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addDayTask()} />
              <button className="rt-addbtn" onClick={addDayTask}><Plus size={20} color="#111" /></button>
            </div>
          </>
        ) : (
          <>
            {state.generalTasks.length === 0 && <div className="rt-empty">Sem tarefas gerais. São coisas sem data marcada.</div>}
            {state.generalTasks.map((t) => (
              <div className="rt-row" key={t.id}>
                <button className={`rt-check ${t.done ? "on" : ""}`} onClick={() => toggleGen(t.id)}>
                  {t.done && <Check size={15} color="#111" strokeWidth={3} />}
                </button>
                <span className={`rt-row-tx ${t.done ? "done" : ""}`}>{t.text}</span>
                <button className="rt-iconbtn" onClick={() => pushToDay(t)} title="Puxar pro dia"><ArrowRight size={17} color={RING.workout} /></button>
                <button className="rt-iconbtn" onClick={() => delGen(t.id)}><Trash2 size={17} /></button>
              </div>
            ))}
            <div className="rt-add">
              <input className="rt-input" placeholder="Nova tarefa geral" value={txt}
                onChange={(e) => setTxt(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addGen()} />
              <button className="rt-addbtn" onClick={addGen}><Plus size={20} color="#111" /></button>
            </div>
          </>
        )}
      </div>

      {/* conteúdo de hoje */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Newspaper size={18} color="#38BDF8" />
          <h2>Conteúdo · {todayStops.estacao}</h2>
        </div>
        {todayStops.stops.map((s, i) => {
          const id = stopId(sel.getDay(), i);
          const on = !!edDone[id];
          return (
            <div className="rt-row" key={id}>
              <button className={`rt-check ${on ? "on" : ""}`} onClick={() => toggleStop(id)}>
                {on && <Check size={15} color="#111" strokeWidth={3} />}
              </button>
              <span className="rt-ed-time">{s.t}</span>
              <span className={`rt-row-tx ${on ? "done" : ""}`} style={{ fontSize: 14 }}>{s.d}</span>
              <span className="rt-ed-kind" style={{ color: KIND_COLORS[s.k] }}>{s.k}</span>
            </div>
          );
        })}
      </div>

      {/* events preview */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Calendar size={18} color={RING.workout} />
          <h2>Eventos de hoje</h2>
        </div>
        {day.events.length === 0 ? (
          <div className="rt-empty">Nenhum evento. Marque na aba Agenda.</div>
        ) : (
          [...day.events].sort((a, b) => (a.time || "").localeCompare(b.time || "")).map((e) => (
            <div className="rt-ev" key={e.id}>
              <div className="rt-ev-time">{e.time || "—"}</div>
              <div>
                <div className="rt-ev-title">{e.title}</div>
                {e.note && <div className="rt-ev-note">{e.note}</div>}
              </div>
            </div>
          ))
        )}
      </div>

      {/* workout shortcut */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Dumbbell size={18} color={RING.workout} />
          <h2>Treino</h2>
        </div>
        {day.workout.done ? (
          <div className="rt-bigbtn done"><Check size={18} /> Treino concluído</div>
        ) : (
          <button className="rt-bigbtn wk" onClick={() => setTab("workout")}>
            <Flame size={18} /> {day.workout.exercises.length ? "Continuar treino" : "Montar treino de hoje"}
          </button>
        )}
      </div>
    </>
  );
}

/* ------------------------------- AGENDA ---------------------------------- */
function AgendaView({ state, setState, sel, setSel, day, setDay }) {
  const [view, setView] = useState(new Date(sel.getFullYear(), sel.getMonth(), 1));
  const [modal, setModal] = useState(false);
  const [f, setF] = useState({ time: "", title: "", note: "" });

  const year = view.getFullYear(), month = view.getMonth();
  const first = new Date(year, month, 1);
  const startPad = first.getDay();
  const daysIn = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startPad; i++) {
    const d = new Date(year, month, i - startPad + 1);
    cells.push({ d, other: true });
  }
  for (let i = 1; i <= daysIn; i++) cells.push({ d: new Date(year, month, i), other: false });
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1].d;
    const d = new Date(last); d.setDate(last.getDate() + 1);
    cells.push({ d, other: true });
  }

  const evCount = (d) => (state.days[keyOf(d)]?.events?.length) || 0;
  const hasWorkout = (d) => state.days[keyOf(d)]?.workout?.done;

  const addEvent = () => {
    if (!f.title.trim()) return;
    setDay({ events: [...day.events, { id: uid(), ...f, title: f.title.trim() }] });
    setF({ time: "", title: "", note: "" });
    setModal(false);

          </div>
          <div className="rt-field">
            <label>Horário</label>
            <input className="rt-input" style={{ width: "100%" }} type="time" value={f.time}
              onChange={(e) => setF({ ...f, time: e.target.value })} />

            <label>Nota (opcional)</label>

          <button className="rt-modal-btn" onClick={addEvent}>Salvar evento</button>
        </Modal>
      )}
    </>
  );
}

/* ------------------------------ WORKOUT ---------------------------------- */
function WorkoutView({ day, setDay, sel }) {
  const [name, setName] = useState("");
  const w = day.workout;
  const plan = PROGRAM[sel.getDay()];

  const loadPlan = () => {
    const exercises = plan.ex.map((e) => ({
      id: uid(), name: e.n, meta: e.meta, hint: e.hint,
      sets: Array.from({ length: e.s }, () => ({ reps: "", load: "" })),
    }));
    setDay({ workout: { ...w, exercises } });
  };

  const addEx = () => {
    if (!name.trim()) return;
    setDay({ workout: { ...w, exercises: [...w.exercises, { id: uid(), name: name.trim(), sets: [{ reps: "", load: "" }] }] } });
    setName("");
  };
  const delEx = (id) => setDay({ workout: { ...w, exercises: w.exercises.filter((e) => e.id !== id) } });
  const addSet = (id) =>
    setDay({ workout: { ...w, exercises: w.exercises.map((e) => e.id === id ? { ...e, sets: [...e.sets, { reps: "", load: "" }] } : e) } });
  const upd = (exId, i, field, val) =>
    setDay({ workout: { ...w, exercises: w.exercises.map((e) => e.id === exId
      ? { ...e, sets: e.sets.map((s, j) => j === i ? { ...s, [field]: val } : s) } : e) } });
  const toggleDone = () => setDay({ workout: { ...w, done: !w.done } });

  return (
    <>
      <div className="rt-card">
        <div className="rt-secttl">
          <Dumbbell size={18} color={RING.workout} />
          <h2>Treino do dia</h2>
        </div>

        <div className="rt-plan">
          <div>
            <div className="rt-eyebrow">{WD[sel.getDay()]} · ciclo</div>
            <div className="rt-plan-foco">{plan.foco}</div>
          </div>
          <button className="rt-plan-btn" onClick={loadPlan}>
            <CalendarCheck size={16} /> Carregar
          </button>
        </div>

        {w.exercises.length === 0 && <div className="rt-empty">Toque em "Carregar" pra puxar o treino do ciclo, ou adicione exercícios manualmente abaixo.</div>}

        {w.exercises.map((ex) => (
          <div className="rt-ex" key={ex.id}>
            <div className="rt-ex-top">
              <span className="rt-ex-name">{ex.name}</span>
              <button className="rt-iconbtn" onClick={() => delEx(ex.id)}><Trash2 size={16} /></button>
            </div>
            {(ex.meta || ex.hint) && (
              <div className="rt-ex-hint">
                {ex.meta && <span className="rt-ex-meta">{ex.meta}</span>}
                {ex.hint && <span>{ex.hint}</span>}
              </div>
            )}
            <div className="rt-set">
              <span className="rt-set-n"></span>
              <div style={{ flex: 1 }}><div className="rt-set-lbl">Reps</div></div>
              <div style={{ flex: 1 }}><div className="rt-set-lbl">Carga (kg)</div></div>
            </div>
            {ex.sets.map((s, i) => (
              <div className="rt-set" key={i}>
                <span className="rt-set-n">{i + 1}</span>
                <input className="rt-set-in" inputMode="numeric" value={s.reps}
                  onChange={(e) => upd(ex.id, i, "reps", e.target.value)} placeholder="—" />
                <input className="rt-set-in" inputMode="decimal" value={s.load}
                  onChange={(e) => upd(ex.id, i, "load", e.target.value)} placeholder="peso corp." />
              </div>
            ))}
            <button className="rt-miniadd" onClick={() => addSet(ex.id)}><Plus size={15} /> Série</button>
          </div>
        ))}

        <div className="rt-add">
          <input className="rt-input" placeholder="Ex.: Flexão, Barra fixa, Corrida 5km" value={name}
            onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addEx()} />
          <button className="rt-addbtn" style={{ background: RING.workout }} onClick={addEx}><Plus size={20} color="#111" /></button>
        </div>
      </div>

      <div className="rt-card">
        <button className={`rt-bigbtn ${w.done ? "done" : "wk"}`} onClick={toggleDone}>
          {w.done ? <><Check size={18} /> Concluído — desmarcar</> : <><Flame size={18} /> Marcar treino como feito</>}
        </button>
      </div>

      <RestTimer />
    </>
  );
}

function RestTimer() {
  const [left, setLeft] = useState(90);
  const [run, setRun] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (run) {
      ref.current = setInterval(() => setLeft((l) => (l <= 1 ? (setRun(false), 0) : l - 1)), 1000);
    }
    return () => clearInterval(ref.current);
  }, [run]);

  const mm = pad(Math.floor(left / 60)), ss = pad(left % 60);
  return (
    <div className="rt-card rt-timer">
      <div className="rt-secttl" style={{ justifyContent: "center" }}>
        <Timer size={18} color={RING.tasks} />
        <h2>Descanso</h2>
      </div>
      <div className="rt-timer-clock" style={{ color: left === 0 ? RING.goals : "#E7EBF2" }}>{mm}:{ss}</div>
      <div className="rt-presets">
        {[60, 90, 120, 180].map((p) => (
          <button key={p} className="rt-preset" onClick={() => { setLeft(p); setRun(false); }}>{p}s</button>
        ))}
      </div>
      <div className="rt-timer-ctrls">
        <button className="rt-tbtn" onClick={() => setRun((r) => !r)}>
          {run ? <><Pause size={16} /> Pausar</> : <><Play size={16} /> Iniciar</>}
        </button>
        <button className="rt-tbtn" onClick={() => { setRun(false); setLeft(90); }}><RotateCcw size={16} /> Zerar</button>
      </div>
    </div>
  );
}

/* ------------------------------ PROGRESS --------------------------------- */
function ProgressView({ state, setState, day, setDay, dk }) {
  const [modal, setModal] = useState(false);
  const [f, setF] = useState({ name: "", unit: "", target: "", color: RING.goals });

  const addGoal = () => {
    if (!f.name.trim() || !f.target) return;
    setState((s) => ({ ...s, goals: [...s.goals, { id: uid(), name: f.name.trim(), unit: f.unit.trim(), target: Number(f.target), color: f.color }] }));
    setF({ name: "", unit: "", target: "", color: RING.goals });
    setModal(false);
  };
  const delGoal = (id) => setState((s) => ({ ...s, goals: s.goals.filter((g) => g.id !== id) }));
  const logGoal = (id, val) => setDay({ goalLog: { ...day.goalLog, [id]: val } });

  // last 14 days data
  const chartData = useMemo(() => {
    const arr = [];
    const base = parseKey(dk);
    for (let i = 13; i >= 0; i--) {
      const d = new Date(base); d.setDate(base.getDate() - i);
      const k = keyOf(d);
      const dd = state.days[k];
      const done = dd ? dd.tasks.filter((t) => t.done).length : 0;
      const wk = dd?.workout?.done ? 1 : 0;
      arr.push({ label: `${d.getDate()}`, tarefas: done, treino: wk });
    }
    return arr;
  }, [state.days, dk]);

  const totalWorkouts = chartData.reduce((a, b) => a + b.treino, 0);

  return (
    <>
      {/* goals */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Target size={18} color={RING.goals} />
          <h2>Metas</h2>
        </div>
        {state.goals.length === 0 && <div className="rt-empty">Crie uma meta com alvo diário — o progresso é calculado do que você registra a cada dia.</div>}
        {state.goals.map((g) => {
          const v = day.goalLog[g.id] || 0;
          const pct = g.target ? Math.min(1, v / g.target) : 0;
          return (
            <div className="rt-goal" key={g.id}>
              <div className="rt-goal-top">
                <span className="rt-goal-name">{g.name}</span>
                <span className="rt-goal-val" style={{ color: g.color }}>{v}<span style={{ color: "var(--dim)", fontSize: 14 }}>/{g.target} {g.unit}</span></span>
              </div>
              <div className="rt-bar"><div className="rt-bar-fill" style={{ width: `${pct * 100}%`, background: g.color }} /></div>
              <div className="rt-goal-log">
                <input className="rt-input" inputMode="decimal" style={{ flex: 1 }} placeholder={`Valor de hoje (${g.unit || "un"})`}
                  value={v || ""} onChange={(e) => logGoal(g.id, Number(e.target.value) || 0)} />
                <button className="rt-iconbtn" onClick={() => delGoal(g.id)}><Trash2 size={17} /></button>
              </div>
            </div>
          );
        })}
        <button className="rt-bigbtn wk" style={{ marginTop: 6, background: RING.goals }} onClick={() => setModal(true)}>
          <Plus size={18} /> Nova meta
        </button>
      </div>

      {/* chart: tarefas */}
      <div className="rt-card">
        <div className="rt-secttl">
          <TrendingUp size={18} color={RING.tasks} />
          <h2>Tarefas concluídas — 14 dias</h2>
        </div>
        <div className="rt-chart-wrap">
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={chartData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#242C38" vertical={false} />
              <XAxis dataKey="label" stroke="#5C6675" fontSize={11} tickLine={false} axisLine={false} />
              <YAxis stroke="#5C6675" fontSize={11} tickLine={false} axisLine={false} allowDecimals={false} width={22} />
              <Tooltip contentStyle={{ background: "#1C222B", border: "1px solid #252C38", borderRadius: 10, color: "#E7EBF2" }}
                cursor={{ fill: "rgba(167,139,250,.1)" }} />
              <Bar dataKey="tarefas" fill={RING.tasks} radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* chart: treinos */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Flame size={18} color={RING.workout} />
          <h2>Treinos — 14 dias ({totalWorkouts})</h2>
        </div>
        <div className="rt-chart-wrap">
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={chartData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#242C38" vertical={false} />
              <XAxis dataKey="label" stroke="#5C6675" fontSize={11} tickLine={false} axisLine={false} />
              <YAxis stroke="#5C6675" fontSize={11} tickLine={false} axisLine={false} allowDecimals={false} width={22} domain={[0, 1]} ticks={[0, 1]} />
              <Tooltip contentStyle={{ background: "#1C222B", border: "1px solid #252C38", borderRadius: 10, color: "#E7EBF2" }} />
              <Line type="stepAfter" dataKey="treino" stroke={RING.workout} strokeWidth={2.5} dot={{ fill: RING.workout, r: 3 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      <BackupCard state={state} setState={setState} />

      {modal && (
        <Modal title="Nova meta" onClose={() => setModal(false)}>
          <div className="rt-field">
            <label>Nome</label>
            <input className="rt-input" style={{ width: "100%" }} value={f.name} autoFocus
              onChange={(e) => setF({ ...f, name: e.target.value })} placeholder="Ex.: Correr, Entregas, Água" />
          </div>
          <div className="rt-field">
            <label>Alvo diário</label>
            <input className="rt-input" style={{ width: "100%" }} inputMode="decimal" value={f.target}

          </div>
          <div className="rt-field">
            <label>Unidade</label>
            <input className="rt-input" style={{ width: "100%" }} value={f.unit}
              onChange={(e) => setF({ ...f, unit: e.target.value })} placeholder="km, L, entregas…" />

          <div className="rt-field">
            <label>Cor</label>
            <div className="rt-colorrow">
              {["#34D399", "#F97316", "#A78BFA", "#38BDF8", "#F43F5E", "#FACC15"].map((c) => (
                <div key={c} className={`rt-swatch ${f.color === c ? "on" : ""}`} style={{ background: c }} onClick={() => setF({ ...f, color: c })} />
              ))}
            </div>
          </div>
          <button className="rt-modal-btn" style={{ background: RING.goals }} onClick={addGoal}>Salvar meta</button>
        </Modal>
      )}
    </>
  );
}

/* ------------------------------ FINANÇAS --------------------------------- */
function FinanceView({ state, setState, dk }) {
  const [msg, setMsg] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [fixModal, setFixModal] = useState(false);
  const [fx, setFx] = useState({ name: "", value: "", remaining: "" });
  const [planModal, setPlanModal] = useState(false);
  const [pl, setPl] = useState({ name: "", value: "", month: "" });
  const fin = state.finance || defaultFinance();
  const monthKey = dk.slice(0, 7);
  const [my, mm] = monthKey.split("-").map(Number);

  const setFin = (patch) => setState((s) => ({ ...s, finance: { ...fin, ...patch } }));

  const send = () => {
    if (!msg.trim()) return;
    const parsed = parseChatMsg(msg);
    if (!parsed) {
      setFeedback({ err: true, text: "Não achei um valor na mensagem. Ex.: \"gastei 35 no mercado\" ou \"recebi 250 das entregas\"." });
      return;
    }
    const entry = { id: uid(), date: dk, ...parsed };
    setFin({ entries: [...fin.entries, entry] });
    setFeedback({ err: false, text: `${parsed.type === "in" ? "Entrada" : "Saída"} de ${fmtR$(parsed.value)} · ${parsed.category}` });
    setMsg("");
  };

  const delEntry = (id) => setFin({ entries: fin.entries.filter((e) => e.id !== id) });

  const monthEntries = fin.entries.filter((e) => e.date.startsWith(monthKey));
  const totalIn = monthEntries.filter((e) => e.type === "in").reduce((a, b) => a + b.value, 0);
  const totalOut = monthEntries.filter((e) => e.type === "out").reduce((a, b) => a + b.value, 0);

  const catTotals = {};
  monthEntries.filter((e) => e.type === "out").forEach((e) => {
    catTotals[e.category] = (catTotals[e.category] || 0) + e.value;
  });
  const maxCat = Math.max(1, ...Object.values(catTotals));

  const activeFixed = fin.fixed.filter((f) => f.remaining === null || f.remaining > 0 || f.paid[monthKey]);
  const totalFixed = activeFixed.reduce((a, f) => a + f.value, 0);

  const addFixed = () => {
    const value = parseMoney(String(fx.value).trim());
    if (!fx.name.trim() || !value || value <= 0) return;
    const remaining = fx.remaining ? Math.max(1, parseInt(fx.remaining, 10) || 0) : null;
    setFin({ fixed: [...fin.fixed, { id: uid(), name: fx.name.trim(), value, remaining, paid: {} }] });
    setFx({ name: "", value: "", remaining: "" });
    setFixModal(false);
  };
  const delFixed = (id) => setFin({ fixed: fin.fixed.filter((f) => f.id !== id) });

  const planned = fin.planned || [];
  const addPlanned = () => {
    const value = parseMoney(String(pl.value).trim());
    if (!pl.name.trim() || !value || value <= 0) return;
    setFin({ planned: [...planned, { id: uid(), name: pl.name.trim(), value, month: pl.month || null, done: false }] });
    setPl({ name: "", value: "", month: "" });
    setPlanModal(false);
  };
  const delPlanned = (id) => setFin({
    planned: planned.filter((p) => p.id !== id),
    entries: fin.entries.filter((e) => e.plannedId !== id),
  });
  const togglePlanned = (p) => {
    if (!p.done) {
      const guess = parseChatMsg(`${p.name} ${p.value}`);
      const entry = { id: uid(), date: dk, type: "out", value: p.value, category: guess ? guess.category : "Outros", desc: `${p.name} (previsto)`, plannedId: p.id };
      setFin({
        entries: [...fin.entries, entry],
        planned: planned.map((x) => x.id === p.id ? { ...x, done: true } : x),
      });
    } else {
      setFin({
        entries: fin.entries.filter((e) => e.plannedId !== p.id),
        planned: planned.map((x) => x.id === p.id ? { ...x, done: false } : x),
      });
    }
  };

  const payFixed = (f) => {
    const paidNow = !!f.paid[monthKey];
    if (!paidNow) {
      const entry = { id: uid(), date: dk, type: "out", value: f.value, category: "Contas", desc: `${f.name} (fixo)`, fixedId: f.id };
      setFin({
        entries: [...fin.entries, entry],
        fixed: fin.fixed.map((x) => x.id === f.id ? {
          ...x, paid: { ...x.paid, [monthKey]: true },
          remaining: x.remaining !== null ? Math.max(0, x.remaining - 1) : null,
        } : x),
      });
    } else {
      setFin({
        entries: fin.entries.filter((e) => !(e.fixedId === f.id && e.date.startsWith(monthKey))),
        fixed: fin.fixed.map((x) => x.id === f.id ? {
          ...x, paid: { ...x.paid, [monthKey]: false },
          remaining: x.remaining !== null ? x.remaining + 1 : null,
        } : x),
      });
    }
  };

  return (
    <>
      {/* resumo do mês */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Wallet size={18} color="#FACC15" />
          <h2>{MOF[mm - 1]} {my}</h2>
        </div>
        <div className="rt-fin-sum">
          <div><div className="rt-fin-lbl">Entradas</div><div className="rt-fin-val" style={{ color: "#34D399" }}>{fmtR$(totalIn)}</div></div>
          <div><div className="rt-fin-lbl">Saídas</div><div className="rt-fin-val" style={{ color: "#F43F5E" }}>{fmtR$(totalOut)}</div></div>
          <div><div className="rt-fin-lbl">Saldo</div><div className="rt-fin-val" style={{ color: totalIn - totalOut >= 0 ? "#34D399" : "#F43F5E" }}>{fmtR$(totalIn - totalOut)}</div></div>
        </div>
      </div>

      {/* chat */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Send size={18} color="#38BDF8" />
          <h2>Registrar pelo chat</h2>
        </div>
        <div className="rt-empty" style={{ padding: "4px 0 10px", textAlign: "left" }}>
          Escreva como falaria: "gastei 35 no mercado", "60 de gasolina", "recebi 280 das entregas". Eu entendo o valor e a categoria sozinho.
        </div>
        <div className="rt-add">
          <input className="rt-input" placeholder='Ex.: gastei 35 no mercado' value={msg}
            onChange={(e) => setMsg(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && send()} />
          <button className="rt-addbtn" style={{ background: "#38BDF8" }} onClick={send}><Send size={18} color="#111" /></button>
        </div>
        {feedback && (
          <div className="rt-fin-feedback" style={{ color: feedback.err ? "#F43F5E" : "#34D399" }}>
            {feedback.err ? "✕ " : "✓ "}{feedback.text}
          </div>
        )}
      </div>

      {/* contas fixas */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Clock size={18} color="#A78BFA" />
          <h2>Contas fixas — {fmtR$(totalFixed)}/mês</h2>
        </div>
        {activeFixed.map((f) => {
          const paid = !!f.paid[monthKey];
          return (
            <div className="rt-row" key={f.id}>
              <button className={`rt-check ${paid ? "on" : ""}`} onClick={() => payFixed(f)}>
                {paid && <Check size={15} color="#111" strokeWidth={3} />}
              </button>
              <div style={{ flex: 1 }}>
                <span className={`rt-row-tx ${paid ? "done" : ""}`}>{f.name}</span>
                {f.remaining !== null && (
                  <div className="rt-fin-parcela">{f.remaining === 0 ? "quitado 🎉" : `faltam ${f.remaining} parcela${f.remaining > 1 ? "s" : ""}`}</div>
                )}
              </div>
              <span className="rt-fin-fixval">{fmtR$(f.value)}</span>
              <button className="rt-iconbtn" onClick={() => delFixed(f.id)}><Trash2 size={16} /></button>
            </div>
          );
        })}
        <button className="rt-bigbtn wk" style={{ marginTop: 12, background: "#A78BFA" }} onClick={() => setFixModal(true)}>
          <Plus size={18} /> Adicionar conta fixa
        </button>
        <div className="rt-empty" style={{ padding: "10px 0 0", fontSize: 12 }}>
          Marcar como paga lança a saída no mês automaticamente (e desconta a parcela).
        </div>
      </div>

      {/* gastos previstos */}
      <div className="rt-card">
        <div className="rt-secttl">
          <CalendarCheck size={18} color="#FACC15" />
          <h2>Gastos previstos — {fmtR$(planned.filter((p) => !p.done).reduce((a, b) => a + b.value, 0))} pendente</h2>
        </div>
        {planned.length === 0 && <div className="rt-empty">Despesas que você já sabe que vêm (pneu, presente, revisão…). Marcou como pago, vira saída no mês.</div>}
        {planned.map((p) => (
          <div className="rt-row" key={p.id}>
            <button className={`rt-check ${p.done ? "on" : ""}`} onClick={() => togglePlanned(p)}>
              {p.done && <Check size={15} color="#111" strokeWidth={3} />}
            </button>
            <div style={{ flex: 1 }}>
              <span className={`rt-row-tx ${p.done ? "done" : ""}`}>{p.name}</span>
              {p.month && <div className="rt-fin-parcela">previsto pra {MOF[Number(p.month.split("-")[1]) - 1]}{p.month.split("-")[0] !== String(my) ? ` ${p.month.split("-")[0]}` : ""}</div>}
            </div>
            <span className="rt-fin-fixval">{fmtR$(p.value)}</span>
            <button className="rt-iconbtn" onClick={() => delPlanned(p.id)}><Trash2 size={16} /></button>
          </div>
        ))}
        <button className="rt-bigbtn wk" style={{ marginTop: 12, background: "#FACC15" }} onClick={() => setPlanModal(true)}>
          <Plus size={18} /> Adicionar gasto previsto
        </button>
      </div>

      {/* categorias */}
      <div className="rt-card">
        <div className="rt-secttl">
          <TrendingUp size={18} color="#F97316" />
          <h2>Gastos por categoria</h2>
        </div>
        {Object.keys(catTotals).length === 0 ? (
          <div className="rt-empty">Sem gastos registrados nesse mês ainda.</div>
        ) : (
          Object.entries(catTotals).sort((a, b) => b[1] - a[1]).map(([cat, v]) => (
            <div key={cat} style={{ marginBottom: 11 }}>
              <div className="rt-goal-top" style={{ marginBottom: 5 }}>
                <span style={{ fontSize: 14, fontWeight: 600 }}>{cat}</span>
                <span className="rt-goal-val" style={{ fontSize: 16, color: CAT_COLORS[cat] || "#8B95A6" }}>{fmtR$(v)}</span>
              </div>
              <div className="rt-bar"><div className="rt-bar-fill" style={{ width: `${(v / maxCat) * 100}%`, background: CAT_COLORS[cat] || "#8B95A6" }} /></div>
            </div>
          ))
        )}
      </div>

      {/* lançamentos do mês */}
      <div className="rt-card">
        <div className="rt-secttl">
          <ListChecks size={18} color="#8B95A6" />
          <h2>Lançamentos do mês</h2>
        </div>
        {monthEntries.length === 0 ? (
          <div className="rt-empty">Nada lançado ainda. Use o chat acima.</div>
        ) : (
          [...monthEntries].reverse().map((e) => (
            <div className="rt-row" key={e.id}>
              <span className="rt-fin-dot" style={{ background: e.type === "in" ? "#34D399" : (CAT_COLORS[e.category] || "#8B95A6") }} />
              <div style={{ flex: 1 }}>
                <span className="rt-row-tx" style={{ fontSize: 14 }}>{e.desc}</span>
                <div className="rt-fin-parcela">{parseKey(e.date).getDate()} {MO[parseKey(e.date).getMonth()]} · {e.category}</div>
              </div>
              <span className="rt-fin-fixval" style={{ color: e.type === "in" ? "#34D399" : "#E7EBF2" }}>
                {e.type === "in" ? "+" : "−"}{fmtR$(e.value)}
              </span>
              <button className="rt-iconbtn" onClick={() => delEntry(e.id)}><Trash2 size={16} /></button>
            </div>
          ))
        )}
      </div>

      {fixModal && (
        <Modal title="Nova conta fixa" onClose={() => setFixModal(false)}>
          <div className="rt-field">
            <label>Nome</label>
            <input className="rt-input" style={{ width: "100%" }} value={fx.name} autoFocus
              onChange={(e) => setFx({ ...fx, name: e.target.value })} placeholder="Ex.: Academia, Seguro da moto" />
          </div>
          <div className="rt-field">
            <label>Valor mensal (R$)</label>
            <input className="rt-input" style={{ width: "100%" }} inputMode="decimal" value={fx.value}
              onChange={(e) => setFx({ ...fx, value: e.target.value })} placeholder="Ex.: 89,90" />
          </div>
          <div className="rt-field">
            <label>Parcelas restantes (deixe vazio se for todo mês, sem fim)</label>
            <input className="rt-input" style={{ width: "100%" }} inputMode="numeric" value={fx.remaining}
              onChange={(e) => setFx({ ...fx, remaining: e.target.value })} placeholder="Ex.: 4" />
          </div>
          <button className="rt-modal-btn" style={{ background: "#A78BFA" }} onClick={addFixed}>Salvar conta fixa</button>
        </Modal>
      )}

      {planModal && (
        <Modal title="Novo gasto previsto" onClose={() => setPlanModal(false)}>
          <div className="rt-field">
            <label>Nome</label>
            <input className="rt-input" style={{ width: "100%" }} value={pl.name} autoFocus
              onChange={(e) => setPl({ ...pl, name: e.target.value })} placeholder="Ex.: Pneu da moto, presente" />
          </div>
          <div className="rt-field">
            <label>Valor (R$)</label>
            <input className="rt-input" style={{ width: "100%" }} inputMode="decimal" value={pl.value}
              onChange={(e) => setPl({ ...pl, value: e.target.value })} placeholder="Ex.: 300" />
          </div>
          <div className="rt-field">
            <label>Mês previsto (opcional)</label>
            <input className="rt-input" style={{ width: "100%" }} type="month" value={pl.month}
              onChange={(e) => setPl({ ...pl, month: e.target.value })} />
          </div>
          <button className="rt-modal-btn" style={{ background: "#FACC15" }} onClick={addPlanned}>Salvar gasto previsto</button>
        </Modal>
      )}
    </>
  );
}

/* ------------------------------- BACKUP ---------------------------------- */
function BackupCard({ state, setState }) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState(null);

  const doExport = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `rotina-backup-${keyOf(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setMsg({ err: false, text: "Backup gerado. Salve o arquivo em Arquivos/iCloud." });
  };

  const doImport = (ev) => {
    const file = ev.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.days) throw new Error("formato");
        if (!data.finance) data.finance = defaultFinance();
        setState(data);
        setMsg({ err: false, text: "Backup restaurado com sucesso!" });
      } catch {
        setMsg({ err: true, text: "Arquivo inválido. Use um backup gerado por este app." });
      }
    };
    reader.readAsText(file);
    ev.target.value = "";
  };

  return (
    <div className="rt-card">
      <div className="rt-secttl">
        <Download size={18} color="#38BDF8" />
        <h2>Backup dos dados</h2>
      </div>
      <div className="rt-empty" style={{ padding: "0 0 10px", textAlign: "left" }}>
        Seus dados vivem só neste aparelho. Exporte de vez em quando e guarde o arquivo no iCloud/Drive.
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button className="rt-bigbtn wk" style={{ background: "#38BDF8" }} onClick={doExport}>
          <Download size={17} /> Exportar
        </button>
        <button className="rt-bigbtn wk" style={{ background: "#252C38", color: "#E7EBF2" }} onClick={() => fileRef.current?.click()}>
          <Upload size={17} /> Importar
        </button>
      </div>
      <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={doImport} />
      {msg && <div className="rt-fin-feedback" style={{ color: msg.err ? "#F43F5E" : "#34D399" }}>{msg.err ? "✕ " : "✓ "}{msg.text}</div>}
    </div>
  );
}

/* ----------------------- ALMANAQUE EDITORIAL ----------------------------- */
function EditorialView({ state, setState, sel }) {
  const [carTxt, setCarTxt] = useState("");
  const ed = state.editorial || defaultEditorial();
  const wk = weekKeyOf(sel);
  const done = ed.weeks[wk]?.done || {};

  const setEd = (patch) => setState((s) => ({ ...s, editorial: { ...ed, ...patch } }));
  const toggleStop = (id) => setEd({
    weeks: { ...ed.weeks, [wk]: { done: { ...done, [id]: !done[id] } } },
  });

  const doneCount = ORDER.reduce((a, dow) =>
    a + EDITORIAL[dow].stops.filter((_, i) => done[stopId(dow, i)]).length, 0);
  const pct = Math.round((doneCount / TOTAL_STOPS) * 100);

  const dias = daysUntil(COLACAO, new Date());
  const monday = parseKey(wk);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);

  const addCar = () => {
    if (!carTxt.trim()) return;
    setEd({ carousels: [...(ed.carousels || []), { id: uid(), text: carTxt.trim(), done: false }] });
    setCarTxt("");
  };
  const toggleCar = (id) => setEd({ carousels: ed.carousels.map((c) => c.id === id ? { ...c, done: !c.done } : c) });
  const delCar = (id) => setEd({ carousels: ed.carousels.filter((c) => c.id !== id) });

  return (
    <>
      {/* cabeçalho do almanaque */}
      <div className="rt-card rt-alm">
        <div className="rt-alm-eyebrow">@at.danielsales · temporada de inverno · 2026</div>
        <div className="rt-alm-ttl">Almanaque Editorial</div>
        <div className="rt-alm-sub">guia de viagem da Fase 1 — autoridade &amp; audiência</div>
        {dias > 0 && (
          <div className="rt-alm-count"><Sparkles size={13} /> faltam {dias} dias para a colação — 08 de agosto</div>
        )}
      </div>

      {/* fases */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Layers size={18} color="#FACC15" />
          <h2>Estação atual</h2>
        </div>
        <div className="rt-phases">
          {PHASES.map((p, i) => (
            <div key={p.n} className={`rt-phase ${i === 0 ? "on" : ""}`}>
              <div className="rt-phase-n">{p.n}</div>
              <div className="rt-phase-w">{p.when}</div>
            </div>
          ))}
        </div>
        <div className="rt-alm-rule">{PHASES[0].rule}</div>
      </div>

      {/* itinerário */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Newspaper size={18} color="#38BDF8" />
          <h2>Itinerário da semana</h2>
        </div>
        <div className="rt-ed-prog">
          <span>{doneCount} de {TOTAL_STOPS} paradas · {pct}%</span>
          <span className="rt-ed-week">{monday.getDate()}–{sunday.getDate()} {MO[sunday.getMonth()]}</span>
        </div>
        <div className="rt-bar" style={{ marginBottom: 4 }}>
          <div className="rt-bar-fill" style={{ width: `${pct}%`, background: "#38BDF8" }} />
        </div>
      </div>

      {ORDER.map((dow) => {
        const d = EDITORIAL[dow];
        const isToday = dow === new Date().getDay();
        const dCount = d.stops.filter((_, i) => done[stopId(dow, i)]).length;
        return (
          <div className={`rt-card rt-ed-day ${isToday ? "hoje" : ""}`} key={dow}>
            <div className="rt-ed-head">
              <div>
                <span className="rt-ed-dow">{DAY_FULL[dow]}</span>
                <span className="rt-ed-est">{d.estacao}</span>
                {isToday && <span className="rt-ed-hoje">· HOJE ·</span>}
              </div>
              <span className="rt-ed-frac">{dCount}/{d.stops.length}</span>
            </div>
            {d.stops.map((s, i) => {
              const id = stopId(dow, i);
              const on = !!done[id];
              return (
                <div className="rt-row" key={id}>
                  <button className={`rt-check ${on ? "on" : ""}`} onClick={() => toggleStop(id)}>
                    {on && <Check size={15} color="#111" strokeWidth={3} />}
                  </button>
                  <span className="rt-ed-time">{s.t}</span>
                  <span className={`rt-row-tx ${on ? "done" : ""}`} style={{ fontSize: 14 }}>{s.d}</span>
                  <span className="rt-ed-kind" style={{ color: KIND_COLORS[s.k] }}>{s.k}</span>
                </div>
              );
            })}
          </div>
        );
      })}

      {/* fila de carrosséis */}
      <div className="rt-card">
        <div className="rt-secttl">
          <Layers size={18} color="#FB7185" />
          <h2>Fila de carrosséis</h2>
        </div>
        {(!ed.carousels || ed.carousels.length === 0) && (
          <div className="rt-empty">Ideias e roteiros na fila. Vão saindo conforme você produz.</div>
        )}
        {(ed.carousels || []).map((c) => (
          <div className="rt-row" key={c.id}>
            <button className={`rt-check ${c.done ? "on" : ""}`} onClick={() => toggleCar(c.id)}>
              {c.done && <Check size={15} color="#111" strokeWidth={3} />}
            </button>
            <span className={`rt-row-tx ${c.done ? "done" : ""}`}>{c.text}</span>
            <button className="rt-iconbtn" onClick={() => delCar(c.id)}><Trash2 size={17} /></button>
          </div>
        ))}
        <div className="rt-add">
          <input className="rt-input" placeholder="Ideia de carrossel" value={carTxt}
            onChange={(e) => setCarTxt(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addCar()} />
          <button className="rt-addbtn" style={{ background: "#FB7185" }} onClick={addCar}><Plus size={20} color="#111" /></button>
        </div>
      </div>

      {/* regra de ouro */}
      <div className="rt-card rt-gold">
        <div className="rt-gold-ttl">Na dúvida, não publica · regra de ouro</div>
        <div className="rt-gold-sub">Sábado é descanso. A linha continua na segunda. ✦</div>
        <div className="rt-gold-quote">"Melhor consistência sustentável que picos seguidos de sumiço." — o itinerário zera toda segunda-feira.</div>
      </div>
    </>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
